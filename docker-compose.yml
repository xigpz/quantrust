version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantrust-backend
    ports:
      - "8080:8080"
    volumes:
      - quantrust-data:/app/data
    environment:
      - RUST_LOG=quantrust_server=info,tower_http=info
      - DATABASE_URL=/app/data/quantrust.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantrust-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  quantrust-data:
    driver: local
